#!/usr/bin/env bash

set -e

TARGET="main"
PROTECTED=("main" "master" "develop" "production" "release")

git fetch --all --prune

git checkout $TARGET
git pull origin $TARGET

for branch in $(git for-each-ref --format='%(refname:short)' refs/heads/)
do
    skip=false

    for p in "${PROTECTED[@]}"
    do
        if [[ "$branch" == "$p" ]]; then
            skip=true
        fi
    done

    if [ "$skip" = true ]; then
        continue
    fi

    echo "Attempting merge: $branch"

    if git merge --no-edit $branch; then
        echo "Merged $branch successfully"
    else
        echo "Conflict detected, aborting merge for $branch"
        git merge --abort
    fi
done

echo "Pruning merged branches"

for branch in $(git branch --merged $TARGET | grep -v "$TARGET")
do
    git branch -d $branch
done

git remote prune origin

echo "Workflow complete"
