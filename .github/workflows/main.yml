name: merge-all

on:
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Fetch branches
        run: git fetch --all --prune

      - name: Merge everything into master
        run: |
          TARGET=master

          git checkout $TARGET
          git pull origin $TARGET

          for branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/ | sed 's/origin\///'); do

            if [ "$branch" = "$TARGET" ]; then
              continue
            fi

            echo "Attempting merge: $branch"

            if git merge origin/$branch --no-edit; then
              echo "Merged $branch"
            else
              echo "Conflict in $branch — skipping"
              git merge --abort || true
            fi

          done

      - name: Push merged master
        run: git push origin master
